<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 20" width="800" height="20" fill="none">
  <defs>
    <!-- Divider Gradient -->
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1B23C9" stop-opacity="0" />
      <stop offset="30%" stop-color="#1B23C9" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#2D305F" stop-opacity="1" />
      <stop offset="70%" stop-color="#C71400" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#C71400" stop-opacity="0" />
    </linearGradient>
  </defs>
  
  <!-- Sleek centered gradient line -->
  <line x1="50" y1="10" x2="750" y2="10" stroke="url(#divGrad)" stroke-width="1.5" />
  
  <!-- Tiny geometric diamond accent in the center -->
  <rect x="397" y="7" width="6" height="6" fill="#2D305F" transform="rotate(45 400 10)" stroke="#C71400" stroke-width="1" />
</svg>
