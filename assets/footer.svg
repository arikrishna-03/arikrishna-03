<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60" width="800" height="60" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
    
    .footer-text {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 500;
      fill: #8F9CAE;
      letter-spacing: 1px;
    }
    .accent-text {
      fill: #C71400;
      font-weight: 600;
    }
    .line-glow {
      stroke: url(#lineGrad);
      stroke-width: 1.5;
    }
  </style>

  <defs>
    <!-- Line Gradient transitioning from Blue to Red with transparent edges -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1B23C9" stop-opacity="0" />
      <stop offset="15%" stop-color="#1B23C9" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#2D305F" stop-opacity="1" />
      <stop offset="85%" stop-color="#C71400" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#C71400" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Glowing Top Border -->
  <line x1="10" y1="10" x2="790" y2="10" class="line-glow" />

  <!-- Left Text -->
  <text x="30" y="38" class="footer-text">
    ARIKRISHNA A <tspan class="accent-text">•</tspan> 2026
  </text>

  <!-- Right Text -->
  <text x="770" y="38" class="footer-text" text-anchor="end">
    DESIGNED WITH PRECISION
  </text>
</svg>
